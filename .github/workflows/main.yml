name: Persistent RDP
on:
  workflow_dispatch:
  schedule:
    # Auto-restart every 5.5 hours to prevent 6-hour timeout
    - cron: '0 */5 * * *'
    # Additional schedule for continuous coverage  
    - cron: '30 */5 * * *'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    concurrency:
      group: rdp-session
      cancel-in-progress: false
    
    steps:
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          # Set timezone to USA Eastern
          tzutil /s "Eastern Standard Time"
          Write-Host "Timezone set to: $(tzutil /g)"
          
          # Enable Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          
          # Configure RDP security settings
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          
          # Configure firewall
          netsh advfirewall firewall delete rule name="Open Port 3389" 2>$null
          netsh advfirewall firewall add rule name="Open Port 3389" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall set rule group="Remote Desktop" new enable=Yes
          
          # Restart RDP service
          Restart-Service TermService -Force
          Write-Host "RDP Configuration completed"
          
      - name: Create RDP User
        shell: powershell
        run: |
          # Generate secure password
          Add-Type -AssemblyName System.Web
          $password = [System.Web.Security.Membership]::GeneratePassword(16, 4)
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Remove existing user if present
          Remove-LocalUser -Name "RDPUser" -ErrorAction SilentlyContinue
          
          # Create new user
          New-LocalUser -Name "RDPUser" `
                       -Password $securePass `
                       -PasswordNeverExpires `
                       -AccountNeverExpires
          
          # Add to groups
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"
          
          # Store credentials in file for later use
          $credsFile = "$env:RUNNER_TEMP\rdp_creds.txt"
          "Username: RDPUser" | Out-File -FilePath $credsFile
          "Password: $password" | Out-File -FilePath $credsFile -Append
          
          echo "RDP_USERNAME=RDPUser" >> $env:GITHUB_ENV
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          
          Write-Host "User created successfully"
          
      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..."
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installerPath = "$env:RUNNER_TEMP\tailscale.msi"
          
          try {
            Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -ErrorAction Stop
            Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait -NoNewWindow
            Write-Host "Tailscale installed successfully"
          }
          catch {
            Write-Error "Failed to install Tailscale: $_"
            exit 1
          }
          finally {
            if (Test-Path $installerPath) {
              Remove-Item $installerPath -Force
            }
          }
          
      - name: Connect to Tailscale
        shell: powershell
        run: |
          $tsExe = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          
          # Verify Tailscale installation
          if (-not (Test-Path $tsExe)) {
            Write-Error "Tailscale executable not found"
            exit 1
          }
          
          # Connect to Tailscale
          $hostname = "gh-runner-$($env:GITHUB_RUN_ID)"
          Write-Host "Connecting as: $hostname"
          
          & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=$hostname
          
          # Wait for IP assignment
          $tsIP = $null
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 10
            $tsIP = & $tsExe ip -4 2>$null
            if ($tsIP) {
              break
            }
            Write-Host "Waiting for Tailscale IP... (Attempt $i/20)"
          }
          
          if (-not $tsIP) {
            Write-Error "Failed to get Tailscale IP"
            exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIP"
          
      - name: Test RDP Connection
        shell: powershell
        run: |
          Write-Host "Testing RDP connectivity to $env:TAILSCALE_IP..."
          
          $success = $false
          for ($i = 1; $i -le 5; $i++) {
            $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
            if ($test.TcpTestSucceeded) {
              $success = $true
              Write-Host "RDP test successful (Attempt $i)"
              break
            }
            Write-Host "Connection attempt $i failed, retrying in 10 seconds..."
            Start-Sleep -Seconds 10
          }
          
          if (-not $success) {
            Write-Error "RDP port 3389 is not accessible"
            exit 1
          }
          
      - name: Display Connection Info
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "RDP CONNECTION DETAILS"
          Write-Host "========================================"
          Write-Host "IP Address: $env:TAILSCALE_IP"
          Write-Host "Username: $env:RDP_USERNAME"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "Port: 3389"
          Write-Host "Location: USA Eastern Time"
          Write-Host "========================================"
          Write-Host "Session will run for 5.5 hours before auto-restart"
          Write-Host "========================================"
          
      - name: Keep Session Alive
        shell: powershell
        run: |
          $startTime = Get-Date
          $maxHours = 5.5
          $maxSeconds = $maxHours * 3600
          
          Write-Host "Starting keep-alive loop..."
          
          while ($true) {
            $elapsed = ((Get-Date) - $startTime).TotalSeconds
            $remaining = $maxSeconds - $elapsed
            
            # Check if we should stop
            if ($remaining -le 1800) {
              Write-Host "`nApproaching time limit - preparing for restart"
              Write-Host "Remaining time: $([math]::Round($remaining/60)) minutes"
              break
            }
            
            # Display status
            $elapsedStr = [math]::Round($elapsed/3600, 1)
            Write-Host "$(Get-Date -Format 'HH:mm:ss') - Session active ($elapsedStr hours)" -NoNewline
            Write-Host "`r" -NoNewline
            
            # Keep connection alive
            Start-Sleep -Seconds 120
          }
